<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESP32-S3-CAM stream</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      background: #111; color: #ddd; font: 14px system-ui, sans-serif;
    }
    /* Centers the frame and reserves the rotated layout size so nothing overlaps. */
    #stage { display: flex; align-items: center; justify-content: center; }
    img {
      max-width: 100vw; max-height: 85vh; background: #000;
      border: 1px solid #333; image-rendering: auto;
      transition: transform 0.15s ease;
    }
    /* When quarter-turned, swap the viewport constraints so the frame still fits. */
    img.rot90 { max-width: 85vh; max-height: 100vw; }
    #status { font-variant-numeric: tabular-nums; }
    .ok { color: #6c6; } .down { color: #c66; }
    button {
      background: #222; color: #ddd; border: 1px solid #444;
      border-radius: 6px; padding: 6px 14px; font: inherit; cursor: pointer;
    }
    button:hover { background: #2c2c2c; }
    button:active { background: #333; }
  </style>
</head>
<body>
  <div id="stage"><img id="frame" alt="waiting for stream…"></div>
  <div id="status">connecting…</div>
  <button id="rotate">Rotate ⟳ (0°)</button>
  <script>
    const img = document.getElementById("frame");
    const stage = document.getElementById("stage");
    const status = document.getElementById("status");
    const rotateBtn = document.getElementById("rotate");
    let rotation = 0;
    let lastUrl = null;
    let frames = 0;
    let lastTick = performance.now();
    let fps = 0;

    function show(blob) {
      const url = URL.createObjectURL(blob);
      img.src = url;
      if (lastUrl) URL.revokeObjectURL(lastUrl);
      lastUrl = url;
      frames++;
      const now = performance.now();
      if (now - lastTick >= 1000) {
        fps = (frames * 1000) / (now - lastTick);
        frames = 0;
        lastTick = now;
      }
      status.textContent = `live · ${fps.toFixed(1)} fps`;
      status.className = "ok";
    }

    function connect() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      const ws = new WebSocket(`${proto}://${location.host}/ws`);
      ws.binaryType = "arraybuffer";
      ws.onopen = () => { status.textContent = "connected"; status.className = "ok"; };
      ws.onmessage = (e) => show(new Blob([e.data], { type: "image/jpeg" }));
      ws.onclose = () => {
        status.textContent = "disconnected · retrying…";
        status.className = "down";
        setTimeout(connect, 1000);
      };
      ws.onerror = () => ws.close();
    }

    // CSS rotate() doesn't change the element's layout box, so reserve the
    // rotated size on the wrapper to stop the frame overlapping other controls.
    function applyRotation() {
      const quarter = rotation === 90 || rotation === 270;
      img.classList.toggle("rot90", quarter);
      img.style.transform = `rotate(${rotation}deg)`;
      const w = img.offsetWidth, h = img.offsetHeight;
      stage.style.width = (quarter ? h : w) + "px";
      stage.style.height = (quarter ? w : h) + "px";
    }

    rotateBtn.addEventListener("click", () => {
      rotation = (rotation + 90) % 360;
      rotateBtn.textContent = `Rotate ⟳ (${rotation}°)`;
      applyRotation();
    });

    // Recompute once the frame's real dimensions are known (and on resize).
    img.addEventListener("load", applyRotation);
    window.addEventListener("resize", applyRotation);

    connect();
  </script>
</body>
</html>
